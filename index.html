<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Grading System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>Student Grading System</h1>
    <p>Java Servlet + PostgreSQL</p>

</header>

<div class="container">

    <!-- Student Information -->

    <section class="card">

        <h2>Student Information</h2>

        <div class="form-group">

            <label>Photo</label>

            <input
                type="file"
                id="photo"
                accept="image/*">

            <img
                id="previewImage">

        </div>

        <div class="form-group">

            <label>Name</label>

            <input
                type="text"
                id="studentName"
                placeholder="Enter Name">

        </div>

        <div class="form-group">

            <label>Roll Number</label>

            <input
                type="text"
                id="rollNumber"
                placeholder="Enter Roll Number">

        </div>

        <div class="form-group">

            <label>Department</label>

            <input
                type="text"
                id="department"
                placeholder="Department">

        </div>

        <div class="form-group">

            <label>Semester</label>

            <input
                type="number"
                id="semester">

        </div>

        <div class="form-group">

            <label>Email</label>

            <input
                type="email"
                id="email"
                placeholder="Email">

        </div>

    </section>

    <!-- Marks -->

    <section class="card">

        <h2>Marks</h2>

        <div class="form-group">

            <label>JavaScript</label>

            <input
                type="number"
                id="jsMarks"
                min="0"
                max="100">

        </div>

        <div class="form-group">

            <label>HTML</label>

            <input
                type="number"
                id="htmlMarks"
                min="0"
                max="100">

        </div>

        <div class="form-group">

            <label>CSS</label>

            <input
                type="number"
                id="cssMarks"
                min="0"
                max="100">

        </div>

    </section>

    <!-- Buttons -->

    <section class="buttons">

        <button id="saveBtn">
            Save Student
        </button>

        <button id="generateBtn">
            Generate Report
        </button>

        <button id="resetBtn">
            Reset
        </button>

    </section>

    <!-- Report -->

    <section class="card">

        <h2>Report Card</h2>

        <div id="reportContainer">

            Report will appear here...

        </div>

    </section>

    <!-- Student Table -->

    <section class="card">

        <h2>Student Records</h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Total</th>
                    <th>Grade</th>
                    <th>Result</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
